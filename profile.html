<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Psikolog</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

<div class="sidebar">
    <div class="logo-area">
        <div class="logo-box">
            <i class="fa-solid fa-brain"></i>
        </div>
        <div>
            <h2>Konseling+</h2>
            <p>Dashboard Psikolog</p>
        </div>
    </div>

    <div class="profile-card">
        <img src="https://i.pravatar.cc/150?img=12" class="profile-img">
        <h3 id="doctorName">Psikolog</h3>
        <span id="doctorSpecialist">Clinical Psychologist</span>
        <div class="online-status">
            <div class="dot"></div> Online
        </div>
    </div>

    <div class="menu">
        <a href="dashboard-admin.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="jadwal.html"><i class="fa-solid fa-calendar"></i> Jadwal Sesi</a>
        <a href="booking.html"><i class="fa-solid fa-user-group"></i> Antrean Konseling</a>
        <a href="laporan.html"><i class="fa-solid fa-notes-medical"></i> Laporan Sesi</a>
        <a href="profile.html" class="active"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div>
            <h1>Profile Psikolog</h1>
            <p>Kelola data diri dan spesialisasi Anda</p>
        </div>
    </div>

    <div class="section" style="position: relative;">
        <div class="section-header">
            <h2>Informasi Profile</h2>
            <p>Kelola data psikolog</p>

            <button id="editIconBtn" onclick="enableEditMode()" style="position: absolute; right: 25px; top: 25px; background: #5C6BC0; border: none; color: white; padding: 8px 14px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; display: none;">
                <i class="fa-solid fa-pen-to-square"></i> Edit Profile
            </button>
        </div>

        <div style="text-align:center; margin-bottom:30px;">
            <img src="https://i.pravatar.cc/200?img=12" id="previewImage" style="width:140px; height:140px; border-radius:50%; object-fit:cover;">
        </div>

        <div id="profileViewContainer" style="display: none;">
            <div class="input-group" style="margin-bottom: 20px;">
                <label style="font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">Nama Lengkap</label>
                <div id="viewNama" style="font-size: 16px; color: #1c1f33; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-weight: 500;">-</div>
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label style="font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">Spesialisasi</label>
                <div id="viewSpesialisasi" style="font-size: 16px; color: #1c1f33; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-weight: 500;">-</div>
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label style="font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">Bio Psikolog</label>
                <div id="viewBio" style="font-size: 16px; color: #1c1f33; padding: 10px 0; line-height: 1.6; white-space: pre-line;">-</div>
            </div>
        </div>

        <div id="profileEditContainer">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap">
            </div>

            <div class="input-group">
                <label>Spesialisasi</label>
                <input type="text" id="spesialisasi" placeholder="Masukkan spesialisasi">
            </div>

            <div class="input-group">
                <label>Bio Psikolog</label>
                <textarea id="bio" placeholder="Tulis biografi singkat Anda..."></textarea>
            </div>

            <div style="margin-top: 25px; display: flex; gap: 10px;">
                <button class="btn-primary" onclick="saveProfile()">
                    Simpan Profile
                </button>
                <button id="cancelBtn" class="btn-primary" onclick="disableEditMode()" style="background-color: #94a3b8; border: none; display: none; cursor: pointer;">
                    Batal
                </button>
            </div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/profile.js"></script>

</body>
</html>

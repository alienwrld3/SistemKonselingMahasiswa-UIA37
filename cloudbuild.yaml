steps:
  # 1. Build Docker image dari Dockerfile bawaan lu
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/backend-service:$COMMIT_SHA', '.']

  # 2. Push image ke Container Registry GCP
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/backend-service:$COMMIT_SHA']

  # 3. Deploy ke Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}' # Diisi otomatis via variabel di Trigger Cloud Build
      - '--image=gcr.io/$PROJECT_ID/backend-service:$COMMIT_SHA'
      - '--region=asia-southeast2' # Region Jakarta
      - '--platform=managed'
      - '--allow-unauthenticated' # Agar API bisa diakses publik oleh Frontend Celsi & Alma
      - '--port=3000' # Sesuai dengan EXPOSE port 3000 di Dockerfile lu

options:
  logging: CLOUD_LOGGING_ONLY
